<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0f2e"/>
      <stop offset="100%" style="stop-color:#0c1a1f"/>
    </linearGradient>
    <linearGradient id="snapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6fd8"/>
      <stop offset="100%" style="stop-color:#ffbe00"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6fd8;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ffbe00;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bgGrad)"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#snapGrad)" stroke-width="1.5" opacity="0.3"/>
  <ellipse cx="100" cy="92" rx="52" ry="46" fill="url(#glowGrad)" filter="url(#softglow)"/>
  <path d="M60 58 Q60 42 76 42 L124 42 Q140 42 140 58 L140 100 Q140 116 124 116 L108 116 L100 132 L92 116 L76 116 Q60 116 60 100 Z" fill="url(#snapGrad)" filter="url(#glow)" opacity="0.95"/>
  <path d="M60 58 Q60 42 76 42 L124 42 Q140 42 140 58 L140 100 Q140 116 124 116 L108 116 L100 132 L92 116 L76 116 Q60 116 60 100 Z" fill="white" opacity="0.08"/>
  <circle cx="82" cy="79" r="7" fill="white" opacity="0.95" filter="url(#glow)"/>
  <circle cx="100" cy="79" r="7" fill="white" opacity="0.95" filter="url(#glow)"/>
  <circle cx="118" cy="79" r="7" fill="white" opacity="0.95" filter="url(#glow)"/>
  <ellipse cx="100" cy="148" rx="5" ry="6" fill="url(#snapGrad)" opacity="0.7"/>
  <ellipse cx="100" cy="162" rx="3" ry="4" fill="url(#snapGrad)" opacity="0.4"/>
  <ellipse cx="100" cy="172" rx="2" ry="2.5" fill="url(#snapGrad)" opacity="0.2"/>
  <g transform="translate(145, 48)" opacity="0.8">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#ffbe00" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#ffbe00" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="#ffbe00" stroke-width="1" stroke-linecap="round"/>
    <line x1="5" y1="-5" x2="-5" y2="5" stroke="#ffbe00" stroke-width="1" stroke-linecap="round"/>
  </g>
  <g transform="translate(52, 145)" opacity="0.5">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#ff6fd8" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#ff6fd8" stroke-width="1.2" stroke-linecap="round"/>
  </g>
</svg>
