<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgCore" cx="50%" cy="45%" r="55%">
      <stop offset="0%" style="stop-color:#2a0845" />
      <stop offset="50%" style="stop-color:#0f0520" />
      <stop offset="100%" style="stop-color:#020008" />
    </radialGradient>
    <radialGradient id="bgOuter" cx="50%" cy="50%" r="50%">
      <stop offset="60%" style="stop-color:transparent" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.6" />
    </radialGradient>
    <linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6fd8" />
      <stop offset="35%" style="stop-color:#df5fff" />
      <stop offset="65%" style="stop-color:#ffad00" />
      <stop offset="100%" style="stop-color:#ff8c42" />
    </linearGradient>
    <linearGradient id="goldShimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe066" />
      <stop offset="40%" style="stop-color:#ffbe00" />
      <stop offset="70%" style="stop-color:#ff9500" />
      <stop offset="100%" style="stop-color:#ffdb70" />
    </linearGradient>
    <radialGradient id="dotGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#ffffff" />
      <stop offset="60%" style="stop-color:#ffe8f7" />
      <stop offset="100%" style="stop-color:#ffb3e6" />
    </radialGradient>
    <linearGradient id="bubbleShine" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.22" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.0" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6fd8" />
      <stop offset="25%" style="stop-color:#c84bff" />
      <stop offset="50%" style="stop-color:#00e5ff" />
      <stop offset="75%" style="stop-color:#ffbe00" />
      <stop offset="100%" style="stop-color:#ff6fd8" />
    </linearGradient>
    <linearGradient id="ring2Grad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6fd8;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#c84bff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffbe00;stop-opacity:0.4" />
    </linearGradient>
    <radialGradient id="nebulaGlow" cx="50%" cy="48%" r="50%">
      <stop offset="0%" style="stop-color:#ff6fd8;stop-opacity:0.35" />
      <stop offset="40%" style="stop-color:#c84bff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ff6fd8;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="dropGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffbe00;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#ffbe00;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="starGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff" />
      <stop offset="100%" style="stop-color:#ffbe00" />
    </radialGradient>
    <filter id="ultraGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur1" />
      <feGaussianBlur stdDeviation="4" in="SourceGraphic" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="deepGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="16" result="b1" />
      <feGaussianBlur stdDeviation="6" in="SourceGraphic" result="b2" />
      <feMerge>
        <feMergeNode in="b1" />
        <feMergeNode in="b2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>
  <circle cx="200" cy="200" r="200" fill="url(#bgCore)" />
  <circle cx="200" cy="200" r="200" fill="url(#bgOuter)" />
  <ellipse cx="200" cy="175" rx="130" ry="115" fill="url(#nebulaGlow)" filter="url(#deepGlow)" />
  <circle cx="48" cy="55" r="1.2" fill="white" opacity="0.5" />
  <circle cx="340" cy="42" r="1.5" fill="white" opacity="0.4" />
  <circle cx="22" cy="180" r="1" fill="#ff6fd8" opacity="0.6" />
  <circle cx="372" cy="155" r="1.2" fill="#00e5ff" opacity="0.5" />
  <circle cx="35" cy="310" r="1.5" fill="white" opacity="0.35" />
  <circle cx="360" cy="330" r="1" fill="#ffbe00" opacity="0.5" />
  <circle cx="80" cy="358" r="1.2" fill="white" opacity="0.3" />
  <circle cx="315" cy="368" r="1" fill="#c84bff" opacity="0.45" />
  <circle cx="165" cy="28" r="1" fill="white" opacity="0.4" />
  <circle cx="245" cy="18" r="1.5" fill="#ffbe00" opacity="0.35" />
  <circle cx="118" cy="368" r="1" fill="#ff6fd8" opacity="0.4" />
  <circle cx="290" cy="355" r="1.2" fill="white" opacity="0.3" />
  <circle cx="200" cy="200" r="178" fill="none" stroke="url(#ring2Grad)" stroke-width="0.8" opacity="0.5" />
  <circle cx="200" cy="200" r="165" fill="none" stroke="url(#ringGrad)" stroke-width="1.2" opacity="0.35" filter="url(#softGlow)" />
  <circle cx="200" cy="200" r="152" fill="none" stroke="url(#ringGrad)" stroke-width="2" opacity="0.55" filter="url(#ultraGlow)" />
  <path d="M118 102 Q118 80 136 80 L264 80 Q282 80 282 102 L282 166 Q282 188 264 188 L230 188 L218 210 L200 232 L182 210 L170 188 L136 188 Q118 188 118 166 Z" fill="#000000" filter="url(#shadow)" opacity="0.35" transform="translate(6,10)" />
  <path d="M118 102 Q118 80 136 80 L264 80 Q282 80 282 102 L282 166 Q282 188 264 188 L230 188 L218 210 L200 232 L182 210 L170 188 L136 188 Q118 188 118 166 Z" fill="url(#aurora)" filter="url(#deepGlow)" opacity="0.4" />
  <path d="M118 102 Q118 80 136 80 L264 80 Q282 80 282 102 L282 166 Q282 188 264 188 L230 188 L218 210 L200 232 L182 210 L170 188 L136 188 Q118 188 118 166 Z" fill="url(#aurora)" filter="url(#subtleGlow)" />
  <path d="M122 102 Q122 84 138 84 L264 84 Q276 84 280 94 Q268 85 248 85 L136 85 Q122 85 122 102 L122 148 Z" fill="url(#bubbleShine)" />
  <circle cx="158" cy="134" r="16" fill="#ff9fe8" filter="url(#deepGlow)" opacity="0.18" />
  <circle cx="200" cy="134" r="16" fill="#ffffff" filter="url(#deepGlow)" opacity="0.15" />
  <circle cx="242" cy="134" r="16" fill="#ffbe00" filter="url(#deepGlow)" opacity="0.18" />
  <circle cx="158" cy="134" r="11" fill="url(#dotGrad)" filter="url(#softGlow)" />
  <circle cx="200" cy="134" r="11" fill="url(#dotGrad)" filter="url(#softGlow)" />
  <circle cx="242" cy="134" r="11" fill="url(#dotGrad)" filter="url(#softGlow)" />
  <ellipse cx="200" cy="252" rx="18" ry="18" fill="url(#dropGlow)" filter="url(#deepGlow)" opacity="0.8" />
  <ellipse cx="200" cy="256" rx="9" ry="11" fill="url(#goldShimmer)" filter="url(#softGlow)" opacity="0.92" />
  <ellipse cx="200" cy="276" rx="6" ry="7.5" fill="url(#goldShimmer)" opacity="0.65" />
  <ellipse cx="200" cy="292" rx="4" ry="5" fill="url(#aurora)" opacity="0.45" />
  <g filter="url(#ultraGlow)" transform="translate(296, 92)">
    <polygon points="0,-14 3,-3 14,0 3,3 0,14 -3,3 -14,0 -3,-3" fill="url(#starGrad)" opacity="0.95" />
    <circle cx="0" cy="0" r="3" fill="white" />
  </g>
</svg>
