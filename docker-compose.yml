services:
  mongodb:
    image: mongo:7
    container_name: messenger-mvp-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
  server:
    build:
      context: ./server
    container_name: messenger-mvp-server
    depends_on:
      - mongodb
    environment:
      PORT: 5001
      MONGODB_URI: mongodb://mongodb:27017/messenger-mvp
      JWT_SECRET: replace-with-a-long-random-secret
      CLIENT_URL: http://localhost:4173
      BCRYPT_ROUNDS: 12
    ports:
      - "5001:5001"
  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:5001/api
        VITE_SOCKET_URL: http://localhost:5001
    container_name: messenger-mvp-client
    depends_on:
      - server
    ports:
      - "4173:4173"

volumes:
  mongo-data:
